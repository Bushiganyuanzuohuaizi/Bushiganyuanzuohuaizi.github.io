site_name: DaranDeng
site_description: Computer Science learning notes
site_author: Daran Deng
site_url: https://darandeng.github.io/

repo_name: DaranDeng/DaranDeng.github.io
repo_url: https://github.com/DaranDeng/DaranDeng.github.io
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2025 - 2026 Daran Deng

theme:
  name: material
  custom_dir: overrides
  language: zh
  features:
    - header.autohide
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - scheme: default
      primary: blue
      accent: light blue
  font:
    text: Roboto Slab
    code: Roboto Mono

