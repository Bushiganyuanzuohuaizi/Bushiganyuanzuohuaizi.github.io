site_name: Lao Deng's Truancy Log
site_description: A structured knowledge site for computer science notes, study maps, and long-term learning records.
site_author: Lao Deng's Truancy Log
site_url: https://bushiganyuanzuohuaizi.github.io/

repo_name: Bushiganyuanzuohuaizi/Bushiganyuanzuohuaizi.github.io
repo_url: https://github.com/Bushiganyuanzuohuaizi/Bushiganyuanzuohuaizi.github.io
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2025 - 2026 Lao Deng's Truancy Log

theme:
  name: material
  custom_dir: overrides
  language: zh
  features:
    - header.autohide
    - navigation.indexes
    - navigation.tabs
    - navigation.tracking
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: brown
  font:
    text: false
    code: false

nav:
  - Home: index.md
  - Algorithms:
      - ds-algorithm/index.md
      - C++ 基础内容笔记: ds-algorithm/cpp-basics.md
      - Double Pointer: ds-algorithm/DoublePointer.md
      - DFS and BFS: ds-algorithm/bfs and dfs.md
      - 哈希法: ds-algorithm/哈希法.md
      - 滑动窗口: ds-algorithm/滑动窗口.md
      - 回溯算法: ds-algorithm/回溯算法.md
      - Algorithms & AI:
          - Algorithms & AI - Overview: ds-algorithm/Algorithms&AI/overview.md
          - Algorithms & AI - Intro: ds-algorithm/Algorithms&AI/algoIntro.md
          - Algorithms & AI - Complexity: ds-algorithm/Algorithms&AI/Complexity.md
          - Algorithms & AI - Factorial & Exponential: ds-algorithm/Algorithms&AI/Factorial&Exponential.md
          - Algorithms & AI - UFS & IFS: ds-algorithm/Algorithms&AI/UFS&IFS.md
          - Algorithms & AI - Sort: ds-algorithm/Algorithms&AI/sortAlgo.md
  - Systems:
      - os/index.md
      - OS 基础知识: os/NotesOfOS.md
      - OS Lesson 1: os/lesson1.md
      - 进程调度 Scheduling: os/scheduling.md
      - 基础 API Basic API: os/BasicAPI.md
      - 进程 Process: os/process.md
      - 并发 Concurrency: os/concurrency.md
      - 内存管理 Memory Management: os/memoryManagement.md
      - TLB: os/TLB.md
      - 磁盘 I/O Disk I/O: os/diskIO.md
      - Harddisk&RAID: os/Harddisk&RAID.md
  - Architecture:
      - computer-architecture/index.md
      - 前四周总结: computer-architecture/totalKnowledge.md
      - Pipelining SuperScalar: computer-architecture/Pipelining SuperScalar.md
      - tutorial01: computer-architecture/tutorial01.md
      - 总线架构 bus architecture: computer-architecture/bus_architecture.md
      - I/O 改进与控制方式: computer-architecture/IO_improvements.md
      - GPGPU 与 GPU 架构: computer-architecture/GPU.md
      - 缓存 Cache: computer-architecture/cache.md
  - Design:
      - ooad/index.md
      - Class Relationship: ooad/week4_classRelationship.md
      - UML Relationship & Component: ooad/week5_UMLrelationship&Component.md
      - Package: ooad/week6_package.md
      - SOLID, Layers & Sequence: ooad/week8_solid&layers&sequence.md
      - Threat Modeling: ooad/threatModeling.md
      - 设计模式简介 Intro to Design Patterns: ooad/observer.md

not_in_nav: |
  README/index.md
  README/CONTRIBUTING.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang:
        - zh
        - en
  - git-revision-date-localized:
      enabled: !ENV [CI, false]
      enable_creation_date: true
      fallback_to_build_date: true

extra_css:
  - _static/css/extra.css

extra_javascript:
  - _static/js/extra.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: true
  # Supports a site code like "abc123", a host like "abc123.goatcounter.com",
  # or a full URL like "https://abc123.goatcounter.com".
  goatcounter_code: "https://邓达然.goatcounter.com"
  giscus:
    enabled: true
    repo: Bushiganyuanzuohuaizi/Bushiganyuanzuohuaizi.github.io
    repo_id: R_kgDOP6Cb6Q
    category: General
    category_id: DIC_kwDOP6Cb6c4CwF_K
    mapping: pathname
    strict: "0"
    reactions_enabled: "1"
    emit_metadata: "0"
    input_position: bottom
    lang: zh-CN
    theme: preferred_color_scheme

exclude_docs: |
  engineering-notes/*
  superpowers/*
