not_in_nav: |
  README/index.md
  README/CONTRIBUTING.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang:
        - zh
        - en
  - git-revision-date-localized:
      enabled: !ENV [CI, false]
      enable_creation_date: true
      fallback_to_build_date: true

extra_css:
  - _static/css/extra.css

extra_javascript:
  - _static/js/extra.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: true
  giscus:
    enabled: true
    repo: EndeavourCHN/DaranDeng.github.io
    repo_id: R_kgDOTFshBA
    category: General
    category_id: DIC_kwDOTFshBM4C_8BG
    mapping: pathname
    strict: "0"
    reactions_enabled: "1"
    emit_metadata: "0"
    input_position: bottom
    lang: zh-CN
    theme: preferred_color_scheme

exclude_docs: |
  engineering-notes/*
  superpowers/*
